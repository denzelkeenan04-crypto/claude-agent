name: Claude Agent

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch: {}

concurrency:
  group: daily-claude
  cancel-in-progress: false

jobs:
  daily-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Maak Notion MCP config
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          cat > "$RUNNER_TEMP/mcp.json" <<EOF
          {
            "mcpServers": {
              "notion": {
                "command": "npx",
                "args": ["-y", "@notionhq/notion-mcp-server"],
                "env": {
                  "OPENAPI_MCP_HEADERS": "{\"Authorization\":\"Bearer ${NOTION_TOKEN}\",\"Notion-Version\":\"2022-06-28\"}"
                }
              }
            }
          }
          EOF

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Je bent de dagelijkse automatisering voor Brandmerck.
            De taken op deze pagina zijn DAGELIJKS terugkerend.
            STAPPEN:
            1. Lees de Notion-pagina "Taken voor Claude" via de Notion MCP-tools.
            2. Zet aan het begin ELKE taak die op "Afgerond" staat terug op
               "Te doen", zodat alles vandaag opnieuw wordt opgepakt.
            3. Voer daarna ELKE taak uit en maak/ververs de output in de map
               output/ (maak die map aan als die niet bestaat). Tekst -> .md bestand.
            4. Zet elke voltooide taak daarna op "Afgerond".
            5. Commit alle bestanden met message "chore: dagelijkse taken".
          claude_args: |
            --mcp-config ${{ runner.temp }}/mcp.json
            --allowedTools Read,Write,Edit,mcp__notion
