name: Claude Agent

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch: {}

concurrency:
  group: daily-claude
  cancel-in-progress: false

jobs:
  daily-task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Maak Notion MCP config
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: |
          cat > "$RUNNER_TEMP/mcp.json" <<EOF
          {
            "mcpServers": {
              "notion": {
                "command": "npx",
                "args": ["-y", "@notionhq/notion-mcp-server"],
                "env": {
                  "OPENAPI_MCP_HEADERS": "{\"Authorization\":\"Bearer ${NOTION_TOKEN}\",\"Notion-Version\":\"2022-06-28\"}"
                }
              }
            }
          }
          EOF

      - name: Run Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Je bent de dagelijkse automatisering voor Brandmerck.
            De taken op deze pagina zijn DAGELIJKS terugkerend.
            STAPPEN:
            1. Lees de Notion-pagina "Taken voor Claude" via de Notion MCP-tools.
            2. Zet aan het begin ELKE taak die op "Afgerond" staat terug op "Te doen".
            3. Voer daarna ELKE taak uit. Maak voor elke taak een bestand in de map
               output/ (maak die map aan als die nog niet bestaat), bijv.
               output/<korte-taaknaam>.md met de gevraagde tekst/inhoud. Voor
               beeld-taken beschrijf je het ontwerp in het .md bestand.
            4. Zet elke voltooide taak in Notion op "Afgerond".
            5. Sla alles op in GitHub via de terminal (Bash):
               git add -A
               git -c user.name="Claude Bot" -c user.email="claude-bot@users.noreply.github.com" commit -m "chore: dagelijkse taken"
               git push origin HEAD:main
               (Als er niets te committen valt, is dat prima.)
          claude_args: |
            --mcp-config ${{ runner.temp }}/mcp.json
            --allowedTools Read,Write,Edit,Bash,mcp__notion

